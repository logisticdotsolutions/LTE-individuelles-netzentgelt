[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
addopts = -ra --strict-markers
markers =
    unit: schnelle Unit-Tests ohne DuckDB-Pipeline
    rules: fachliche Regeltests R001 bis R016
    integration: modulübergreifende DuckDB-Fixture-Tests
    smoke: vollständiger temporärer Pipeline-Smoke-Test
    regression: definierte Soll-Kennzahlen
