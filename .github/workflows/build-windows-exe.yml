name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  test-and-build:
    name: Test and build Windows portable EXE
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt
          python -m pip install -r requirements-test.txt

      - name: Run tests
        shell: pwsh
        run: .\RUN_TESTS.bat

      - name: Build Windows EXE package
        shell: pwsh
        run: .\BUILD_WINDOWS_EXE.bat -SkipDependencyInstall

      - name: Stage release artifact
        shell: pwsh
        run: .\scripts\stage_latest_release_artifact.ps1

      - name: Upload key-user package
        uses: actions/upload-artifact@v4
        with:
          name: NetzentgeltMVP_KeyUser_Windows_Portable
          path: _keyuser_package/NetzentgeltMVP_KeyUser.zip
          if-no-files-found: error
          retention-days: 14
